
<!DOCTYPE html>
<html>
  <head>
<style>
  /* Sets the page background to grey */
  body {
    background-color: #333333; 
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
  }

  h1 {
    color: white;
  }

  /* Styling for the buttons */
  .button {
    text-decoration: none;
    font-size: 1.2rem;
    cursor: pointer;
    background: #000000;      /* Black button */
    color: #ffffff !important; /* White text */
    padding: 15px 25px;
    margin: 10px;
    border-radius: 25px;      /* This makes the corners rounded */
    display: inline-block;
    transition: 0.3s;         /* Smooth hover effect */
    border: 1px solid #444;
    width: 300px;
    text-align: center;
  }

  /* Changes color slightly when you hover over it */
  .button:hover {
    background: #222222;
    transform: scale(1.02);
  }
  </style>
</head>
<body>
<h1>Lindsay's Notion Widgets</h1></h1>
  <a class="button" href="https://lmedeiros9.github.io/notion-compendium/date-timee">Date Time Widget</a>
  <a class="button" href="https://lmedeiros9.github.io/notion-compendium/witchy-affirmations">Witchy, Fantastical & Sinister Affirmations</a>
  <a class="button" href="https://lmedeiros9.github.io/notion-compendium/moonphase-widget">Moon Phases</a>
  <a class="button" href="https://lmedeiros9.github.io/notion-compendium/wellness-wheel">Wellness Wheel</a>

</body>
</html>
